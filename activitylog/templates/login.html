{% extends "base_generic.html" %}

{% block title %} Login {% endblock %}

{% block content %}
<h2>Login</h2>
<form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    <input type="text" name="login">
    <input type="password" name="password">
    <input type="submit" value="login">
</form>

{% endblock %}
